org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# R8 full mode (default since AGP 8) obfuscates aggressively and breaks
# reflection-based libraries that ship no consumer proguard rules, which the
# ML Kit document scanner and WorkManager both hit here. The keep rules in
# app/proguard-rules.pro fix the known cases; this stops the whole class of
# release-only crashes from libraries not yet exercised. R8 still minifies.
android.enableR8.fullMode=false
