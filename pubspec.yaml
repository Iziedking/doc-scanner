name: docscan
description: A document scanner for Android and iOS. Scan, organize, and export PDFs on device.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

# Every version below was verified on pub.dev on 2026-07-13 and pinned exactly,
# per the documentation-first rule in PLAN.md. When you bump one, read its
# changelog first. purchases_flutter 10 raised the Android floor to API 23.
dependencies:
  flutter:
    sdk: flutter

  # Scanner: ML Kit on Android, VisionKit on iOS.
  flutter_doc_scanner: 0.0.21

  # On-device OCR.
  google_mlkit_text_recognition: 0.16.0

  # Storage.
  sqflite: 2.4.3
  path_provider: 2.1.6
  path: 1.9.1

  # PDF assembly, preview, print.
  pdf: 3.13.0
  printing: 5.15.0

  # Share and save out.
  share_plus: 13.2.0

  # Image compression and downscale.
  image: 4.9.1

  # Billing (RevenueCat).
  purchases_flutter: 10.4.1

  # State.
  flutter_riverpod: 3.3.2

  # Small id generator for documents and pages.
  uuid: 4.5.3

  # Remembers that onboarding was seen.
  shared_preferences: 2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  # Runs sqflite against a real SQLite in unit tests, no device needed.
  sqflite_common_ffi: 2.4.2
  # Icon and splash generators. Configs are at the bottom of this file;
  # regenerate with: dart run flutter_launcher_icons
  # and: dart run flutter_native_splash:create
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B0B0D"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B0B0D"
  image: assets/brand/splash_logo.png
  android_12:
    color: "#0B0B0D"
    image: assets/brand/splash_logo.png
